name: Laravel

on:
  push:
    branches: [ "testing" ]
  pull_request:
    branches: [ "testing" ]

jobs:
  laravel-tests:

    runs-on: ubuntu-latest

    steps:
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4' # Match Php Version
        #extensions: | #from AI (some or lots of it could be redundant)
         # mbstring, xml, ctype, curl, dom, fileinfo, filter, hash,
          #iconv, intl, json, libxml, pdo, pdo_sqlite, phar, simplexml,
          #tokenizer, xmlreader, xmlwriter, zip, bcmath, gd, exif,
          #openssl, pcntl, posix, sockets, sqlite3
        #coverage: pcov
        #tools: composer:v2

    - uses: actions/checkout@v3
    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
    - name: Generate key
      run: php artisan key:generate
    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache
    - name: Create Database
      run: |
        mkdir -p database
        rm -f database/database.sqlite
        touch database/database.sqlite
    - name: Build DB from seeder data
      run: |
        php artisan migrate --force
        php artisan db:seed --force
    - name: Execute tests (Unit and Feature tests) via PHPUnit/Pest
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan test
